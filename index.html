<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Encryption & Decryption Challenge</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    
    <div class="container">
        <div class="input-section">
            <div class="header">
                <img src="logo.png" alt="logo" class="logo">
            </div>
            <h1>Insert text here</h1>
            <textarea id="inputText" placeholder="Insert text here"></textarea>
            <div class="buttons">
                <button id="encryptBtn">Encryption</button>
                <button id="decryptBtn">Decryption</button>
            </div>
            <p class="note">Only lower case letters without accents</p>
        </div>
        <div class="output-section">
            <p>No message found</p>
            <p>Insert text here for encryption or decryption.</p>
        </div>
        <img src="assets/Muñeco.png" alt="Magnify Glass Image" class="output-image">
        </div>
    </div>
</body>
</html>
