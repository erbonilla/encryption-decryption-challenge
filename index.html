<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100..900&display=swap" rel="stylesheet">
    <title>Encryption & Decryption Challenge</title>

</head>
<body>
    <header>
        <img class="logo" src="/assets/Logo.png" alt="Logo Alura">
    </header>
        <main>
            <section>
                <textarea class="text-area" cols="30" rows="10" placeholder="insert Text Here">Insert Text Here</textarea>
                <div>
                    <h6 class="information">Only lower case and without accents</h6>
                </div>
            <div class="buttons">
                <button class="encryptionBtn">Encryption</button>
                <button class="decryptionBtn">Decryption</button>
            </div>
        </section>
        <section>
            <textarea class="message" cols="30" rows="10"></textarea>
            <div>
                <button class="copy">Copy</button>
            </div>
        </section>
    </main>
</body>
</html>
